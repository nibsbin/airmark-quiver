name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          new_version=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.version }}"

      - name: Publish to npm (trusted publisher, with provenance)
        run: npm publish --provenance --access public

      - name: Push commit and tag
        run: |
          git push origin HEAD:"${GITHUB_REF_NAME}"
          git push origin "${{ steps.bump.outputs.version }}"
