name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          pkg_version="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${pkg_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${pkg_version}" >&2
            exit 1
          fi

      - name: Publish to npm (trusted publisher, with provenance)
        run: npm publish --provenance --access public
