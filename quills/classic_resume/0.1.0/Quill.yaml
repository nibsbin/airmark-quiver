quill:
  name: classic_resume
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  example_file: example.md
  description: "Clean, dense single-page resume (TTQ Classic)."

main:
  body:
    example: |
      Backend engineer with 6+ years building distributed systems for
      high-traffic consumer products. Strong in Go, Python, and
      infrastructure-as-code; happiest reducing latency tail and on-call load.

  fields:
    name:
      type: string
      required: true
      example: Jane Doe
      ui:
        group: Header
      description: Full name as it should appear at the top.

    contacts:
      type: array
      items:
        type: string
      required: true
      example:
        - "mailto:jane@example.com"
        - "+1 (555) 555-5555"
        - San Francisco, CA
        - "https://janedoe.dev"
      ui:
        group: Header
      description: |
        Contact line items joined by ❖. Strings starting with `http://`,
        `https://`, or `mailto:` auto-link; everything else renders as
        Typst markup so `*bold*`, `_italic_`, and `#link(...)` are honored.

    certifications:
      type: array
      items:
        type: string
      ui:
        group: Certifications
      example:
        - Offensive Security Certified Professional (OSCP)
        - GIAC Cyber Threat Intelligence (GCTI)
      description: Flat list of active certifications, rendered in a multi-column grid above Skills.

    certification_columns:
      type: integer
      default: 2
      ui:
        group: Certifications
        compact: true
      description: Number of certification grid columns.

    skills:
      type: array
      ui:
        group: Skills
      items:
        type: object
        properties:
          category:
            type: string
            required: true
            ui:
              compact: true
          text:
            type: string
            required: true
      example:
        - { category: Languages, text: "Go, Python, TypeScript, Rust" }
        - { category: Frameworks, text: "FastAPI, Django, React, Next.js" }
        - { category: Infrastructure, text: "Kubernetes, AWS, Terraform, PostgreSQL, Kafka" }
        - { category: Tools, text: "Git, Docker, Bazel, Datadog" }
      description: Categorized skills grid. Each item has a bold category header and a comma-separated text body.

    skill_columns:
      type: integer
      default: 2
      ui:
        group: Skills
        compact: true
      description: Number of skills grid columns (1–3 typical).

    experience:
      type: array
      ui:
        group: Work Experience
      items:
        type: object
        properties:
          role:
            type: string
            required: true
            ui:
              compact: true
          organization:
            type: string
            required: true
            ui:
              compact: true
          location:
            type: string
            ui:
              compact: true
          dates:
            type: string
            ui:
              compact: true
          bullets:
            type: array
            items:
              type: string
            description: One bullet per line. Typst markup is honored.
      example:
        - role: Senior Software Engineer
          organization: Acme Corp.
          location: Remote
          dates: Jan 2023 — Present
          bullets:
            - Led migration of a 400 kLoC monolith to event-driven microservices, dropping p99 checkout latency from 1.8 s to 240 ms.
            - Designed a real-time pricing service handling 50 K req/s on a 6-node Kubernetes cluster.
            - Mentored 4 engineers; introduced trunk-based development and codified release practices.
      description: Work history, newest first.

    education:
      type: array
      ui:
        group: Education
      items:
        type: object
        properties:
          degree:
            type: string
            required: true
          school:
            type: string
            required: true
          location:
            type: string
            ui:
              compact: true
          dates:
            type: string
            ui:
              compact: true
          bullets:
            type: array
            items:
              type: string
            description: Optional supporting bullets (honors, GPA, coursework).
      example:
        - degree: "B.S. Computer Science, *summa cum laude*"
          school: State University
          location: Anytown, USA
          dates: 2015 — 2019

    competitions:
      type: array
      ui:
        group: Cyber Competition
      items:
        type: object
        properties:
          title:
            type: string
            required: true
          bullets:
            type: array
            items:
              type: string
      example:
        - title: 1st in SANS Academy Cup 2024
          bullets:
            - Solving SQLi, API, and HTTP packet crafting problems.
      description: Competitions, hackathons, or similar achievements with bullets but no role/dates.

    projects:
      type: array
      ui:
        group: Projects
      items:
        type: object
        properties:
          name:
            type: string
            required: true
          url:
            type: string
            description: Optional URL; rendered top-right in monospace italic. Auto-linked when the value starts with http/https.
          bullets:
            type: array
            items:
              type: string
      example:
        - name: Quillmark
          url: "https://quillmark.dev"
          bullets:
            - Open-source markdown-to-PDF engine powered by Typst.

    awards:
      type: array
      ui:
        group: Awards
      items:
        type: object
        properties:
          title:
            type: string
            required: true
          issuer:
            type: string
            ui:
              compact: true
          date:
            type: string
            ui:
              compact: true
      example:
        - title: Engineering Excellence Award
          issuer: Acme Corp.
          date: "2024"
      description: One-line entries for awards, honors, or publications.
