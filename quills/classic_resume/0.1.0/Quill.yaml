quill:
  name: classic_resume
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  example_file: example.md
  description: "Clean, dense single-page resume (TTQ Classic). Sections are composable cards rendered in document order."

main:
  body:
    example: |
      Backend engineer with 6+ years building distributed systems for
      high-traffic consumer products. Strong in Go, Python, and
      infrastructure-as-code; happiest reducing latency tail and on-call load.

  fields:
    name:
      type: string
      required: true
      example: Jane Doe
      description: Full name as it should appear at the top.

    contacts:
      type: array
      items:
        type: string
      required: true
      example:
        - "mailto:jane@example.com"
        - "+1 (555) 555-5555"
        - San Francisco, CA
        - "https://janedoe.dev"
      description: |
        Contact line items joined by ❖. Strings starting with `http://`,
        `https://`, or `mailto:` auto-link; everything else is plain text.

card_types:
  certifications:
    description: Flat list of credentials rendered in a multi-column grid.
    ui:
      title: Active Certifications
    body:
      enabled: false
    fields:
      header:
        type: string
        description: "Section header to render above this card (e.g. 'Active Certifications'). Leave blank to omit."
      columns:
        type: integer
        default: 2
        ui:
          compact: true
      items:
        type: array
        required: true
        items:
          type: string
        example:
          - Offensive Security Certified Professional (OSCP)
          - GIAC Cyber Threat Intelligence (GCTI)

  skills:
    description: Categorized skills grid. Each item has a bold category header and a comma-separated text body.
    ui:
      title: Skills
    body:
      enabled: false
    fields:
      header:
        type: string
        description: Section header to render above this card. Leave blank to omit.
      columns:
        type: integer
        default: 2
        ui:
          compact: true
      items:
        type: array
        required: true
        items:
          type: object
          properties:
            category:
              type: string
              required: true
              ui:
                compact: true
            text:
              type: string
              required: true
        example:
          - { category: Languages, text: "Go, Python, TypeScript, Rust" }
          - { category: Frameworks, text: "FastAPI, Django, React, Next.js" }

  experience:
    description: One job. Bullets go in the card body as a markdown list.
    ui:
      title: Work Experience entry
    body:
      example: |
        - Led migration of a 400 kLoC monolith to event-driven microservices, dropping p99 checkout latency from 1.8 s to 240 ms.
        - Designed a real-time pricing service handling 50 K req/s on a 6-node Kubernetes cluster.
    fields:
      header:
        type: string
        description: "Section header (typically 'Work Experience' on the first card of this type, blank on subsequent)."
      role:
        type: string
        required: true
        ui:
          compact: true
      organization:
        type: string
        required: true
        ui:
          compact: true
      location:
        type: string
        ui:
          compact: true
      dates:
        type: string
        ui:
          compact: true

  education:
    description: One degree. Optional bullets (honors, GPA, coursework) go in the card body.
    ui:
      title: Education entry
    body:
      example: |
        - Distinguished Graduate (top 10%); relevant coursework: Distributed Systems, Cryptography.
    fields:
      header:
        type: string
        description: Section header. Set on the first education card of a run; leave blank on subsequent.
      degree:
        type: string
        required: true
      school:
        type: string
        required: true
      location:
        type: string
        ui:
          compact: true
      dates:
        type: string
        ui:
          compact: true

  competition:
    description: A competition placing or hackathon. Bullets in the card body describe the event.
    ui:
      title: Cyber Competition entry
    body:
      example: |
        - Competed as the team's web exploit SME, solving SQLi, API, and HTTP packet crafting problems.
    fields:
      header:
        type: string
        description: "Section header (e.g. 'Cyber Competition'). First card of run only."
      title:
        type: string
        required: true
        description: "Placement and event name (e.g. '1st in SANS Academy Cup 2024')."

  project:
    description: A project. Bullets in the card body describe it; URL renders top-right in monospace italic.
    ui:
      title: Project
    body:
      example: |
        - Open-source markdown-to-PDF engine powered by Typst; 1.5 K GitHub stars.
    fields:
      header:
        type: string
        description: "Section header (e.g. 'Projects'). First card of run only."
      name:
        type: string
        required: true
      url:
        type: string
        description: Optional URL. Auto-linked when it starts with `http://` or `https://`; otherwise rendered as plain monospace italic text.

  award:
    description: One-line entry for awards, honors, or publications.
    ui:
      title: Award
    body:
      enabled: false
    fields:
      header:
        type: string
        description: Section header. First card of run only.
      title:
        type: string
        required: true
      issuer:
        type: string
        ui:
          compact: true
      date:
        type: string
        ui:
          compact: true
